{% comment %}
  essay-complete.html — "Mark as complete" toggle for series essays.
  Stores completion state in localStorage under 'wh-complete:<page-url>'.
  Renders nothing for posts that are not part of a series.
{% endcomment %}
{% if page.series %}
<div class="essay-complete" x-data="essayProgress('{{ page.url }}')">
  <button
    class="essay-complete-btn"
    :class="{ 'essay-complete-btn--done': completed }"
    @click="toggle()"
    type="button"
    :aria-label="completed ? 'Mark as incomplete' : 'Mark essay as complete'"
  >
    <svg x-show="!completed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/></svg>
    <svg x-show="completed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span x-text="completed ? 'Completed' : 'Mark as complete'">Mark as complete</span>
  </button>
</div>
{% endif %}
